version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analytics}
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - analytics-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analytics} -d ${POSTGRES_DB:-analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: analytics-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./analytics/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-analytics}:${POSTGRES_PASSWORD:-analytics}@postgres:5432/${POSTGRES_DB:-analytics}?schema=public
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./analytics:/app
      - analytics-node-modules:/app/node_modules
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  analytics-postgres-data:
  analytics-node-modules: